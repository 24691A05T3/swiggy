<!DOCTYPE html>
<html>
<head>
    <title>Food App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🍔 My Food App</h1>

    <div class="menu">
        <div class="item">
            <h3>Pizza</h3>
            <p>₹200</p>
            <button onclick="addToCart('Pizza',200)">Add</button>
        </div>

        <div class="item">
            <h3>Burger</h3>
            <p>₹150</p>
            <button onclick="addToCart('Burger',150)">Add</button>
        </div>

        <div class="item">
            <h3>Fries</h3>
            <p>₹100</p>
            <button onclick="addToCart('Fries',100)">Add</button>
        </div>
    </div>

    <h2>🛒 Cart</h2>
    <ul id="cart"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>

    <script src="script.js"></script>
</body>
</html>
